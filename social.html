<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.70">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="modern-normalize.css">
    <link rel="stylesheet" href="style.css">
    <script data-goatcounter="https://jctdrs.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
    <title>Social / jctdrs</title>
</head>
<body>
    <h4>Social</h4>
    <div class="gallery" id="gallery"></div>

    <div class="view-full" id="viewFull">
        <span class="view-full-close" id="viewFullClose">&times;</span>
        <span class="view-full-nav view-full-prev" id="viewFullPrev">&#10094;</span>
        <span class="view-full-nav view-full-next" id="viewFullNext">&#10095;</span>
        <span class="view-full-counter" id="viewFullCounter"></span>
        <img id="viewFullImg" src="" alt="">
    </div>

    <div id="cusdis_thread"
      data-host="https://cusdis.com"
      data-app-id="3804bd6c-c9a2-489d-afc0-c93000c29db3"
      data-page-id="social"
      data-page-url="https://jctdrs.github.io/social.html"
      data-page-title="Social / jctdrs"
    ></div>
    <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

    <hr>
    <nav>
        <a href="index.html" class="home-btn"><b>Home</b></a>
    </nav>
    <hr>

    <script>
    var images = [], current = -1, startX = 0;

    function t(u) { return u.replace('w_1200', 'w_400'); }

    fetch('data/social.json').then(function(r) { return r.json(); }).then(function(data) {
        images = data;
        var html = '';
        for (var i = 0; i < images.length; i++) {
            html += '<a class="gallery-item" href="#" onclick="openView(' + i + '); return false;">' +
                    '<img src="' + t(images[i]) + '" alt=""></a>';
        }
        document.getElementById('gallery').innerHTML = html;
    });

    function openView(i) {
        current = i;
        document.getElementById('viewFullImg').src = t(images[i]);
        document.getElementById('viewFullCounter').textContent = (i + 1) + ' / ' + images.length;
        document.getElementById('gallery').style.display = 'none';
        document.getElementById('viewFull').style.display = 'block';
        document.querySelector('nav').style.display = 'none';
        window.scrollTo(0, 0);
        history.pushState({ view: true }, '');
        if (i + 1 < images.length) { var a = new Image(); a.src = t(images[i + 1]); }
    }

    function closeView() {
        document.getElementById('viewFull').style.display = 'none';
        document.getElementById('gallery').style.display = 'grid';
        document.querySelector('nav').style.display = 'flex';
        history.pushState({}, '');
    }

    document.getElementById('viewFullClose').onclick = closeView;
    document.getElementById('viewFullPrev').onclick = function() { if (current > 0) openView(current - 1); };
    document.getElementById('viewFullNext').onclick = function() { if (current < images.length - 1) openView(current + 1); };

    document.addEventListener('keydown', function(e) {
        if (current === -1) return;
        if (e.key === 'Escape') closeView();
        if (e.key === 'ArrowLeft' && current > 0) openView(current - 1);
        if (e.key === 'ArrowRight' && current < images.length - 1) openView(current + 1);
    });

    document.getElementById('viewFull').addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
    });

    document.getElementById('viewFull').addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) < 50) return;
        if (dx > 0 && current > 0) openView(current - 1);
        if (dx < 0 && current < images.length - 1) openView(current + 1);
    });

    document.getElementById('viewFull').onclick = function(e) {
        if (e.target === document.getElementById('viewFull')) closeView();
    };

    window.onpopstate = function() { if (current !== -1) closeView(); };
    </script>
</body>
</html>
